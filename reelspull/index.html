<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF 뽑기 게임</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .slot-container {
            width: 600px;
            height: 120px;
            border: 4px solid #fff;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .slot-strip {
            display: flex;
            height: 100%;
            position: relative;
            transition: transform 0.1s linear;
        }

        .slot-strip.stopping {
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .gif-item {
            min-width: 120px;
            height: 112px;
            background: #f0f0f0;
            border-right: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            position: relative;
            overflow: hidden;
        }

        .gif-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gif-item.spinning img {
            animation-play-state: paused;
            opacity: 0.8;
        }

        .center-highlight {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 120px;
            transform: translateX(-50%);
            border: 3px solid #ffd700;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            pointer-events: none;
            z-index: 10;
        }

        .spin-button {
            background: linear-gradient(145deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spin-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.6);
        }

        .spin-button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-container {
            margin-top: 30px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .history-container {
            margin-top: 24px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.18);
            text-align: left;
        }

        .history-title {
            margin: 0 0 14px;
            color: white;
            font-size: 18px;
            letter-spacing: 0.04em;
        }

        .history-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 10px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .history-name {
            text-transform: capitalize;
            font-weight: bold;
        }

        .history-count {
            color: #ffd700;
            font-variant-numeric: tabular-nums;
        }

        .winner-gif {
            max-width: 150px;
            max-height: 100px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: scale(0);
            animation: popIn 0.5s ease-out forwards;
        }

        @keyframes popIn {
            0% {
                transform: scale(0) rotate(180deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .winner-text {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5), 0 0 10px #ffd700;
            }
            to {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5), 0 0 20px #ffd700, 0 0 30px #ffd700;
            }
        }

        .placeholder-gif {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24, #f0932b);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }

        .big-winner-overlay {
            position: fixed;
            left: 0; top: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            background: rgba(0,0,0,0.5);
            animation: fadeIn 0.5s;
        }

        @keyframes play-once {
          from {
            background-position: 0 0;
          }
          to {
            background-position: 100% 0;
          }
        }

        .big-winner-img {
            width: 320px;
            height: 320px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            background: white;
            animation: popInBig 0.5s;
            animation-name: play-once;
            animation-duration: 2s;
            animation-iteration-count: 1;

        }
        @keyframes popInBig {
            0% { transform: scale(0.2) rotate(-30deg); opacity: 0; }
            60% { transform: scale(1.1) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes fadeOutBig {
            0% { opacity: 1; transform: scale(1);}
            100% { opacity: 0; transform: scale(0.7);}
        }
        @keyframes fadeIn {
            0% { opacity: 0;}
            100% { opacity: 1;}
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎰 GIF 뽑기 게임</h1>

        <div class="slot-container">
            <div class="slot-strip" id="slotStrip">
                <!-- GIF items will be dynamically added here -->
            </div>
            <div class="center-highlight"></div>
            
        </div>
        

        <button class="spin-button" id="spinButton">🎰 SPIN!</button>

        <div class="result-container" id="resultContainer">
            <div style="color: white; opacity: 0.7;">SPIN 버튼을 눌러서 GIF를 뽑아보세요!</div>
        </div>

        <div class="history-container">
            <h2 class="history-title">Pull History</h2>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        const GIFS = [
            "gif/absmal.gif",
            "gif/common.gif",
            "gif/uncommon.gif",
            "gif/rare.gif",
            "gif/exotic.gif",
            "gif/mythic.gif",
            "gif/legendary.gif",
            "gif/unreal.gif",
            "gif/insane.gif",
            "gif/godlike.gif"
        ];

        const REEL_PLACEHOLDER_URL = "gif/phone reel gif 1frame.png.svg";
        const ITEM_WIDTH = 120;
        const REEL_REPEAT_COUNT = 5;
        const START_OFFSET_MIN = -720;
        const START_OFFSET_MAX = -120;
        const TICK_MS = 16;
        const SLOT_CENTER = 300;
        const HIGHLIGHT_CENTER_OFFSET = 270;
        const OVERLAY_SHOW_DELAY_MS = 500;
        const OVERLAY_DISMISS_DELAY_MS = 1000;
        const WINNER_GIF_DURATION_MS = 3000;

        const slotStrip = document.getElementById('slotStrip');
        const spinButton = document.getElementById('spinButton');
        const resultContainer = document.getElementById('resultContainer');
        const historyList = document.getElementById('historyList');
        const pullCounts = Object.fromEntries(GIFS.map((gif) => [gif, 0]));

        const state = {
            isSpinning: false,
            currentOffset: 0,
            spinSpeed: 12,
            spinTime: 0,
            spinInterval: null
        };

        spinButton.addEventListener('click', startSpin);

        function setupSlots() {
            const totalItems = GIFS.length * REEL_REPEAT_COUNT;

            slotStrip.innerHTML = '';
            renderPullHistory();

            for (let index = 0; index < totalItems; index += 1) {
                slotStrip.appendChild(createSlotItem(index % GIFS.length));
            }
        }

        function createSlotItem(gifIndex) {
            const gifItem = document.createElement('div');
            gifItem.className = 'gif-item';
            gifItem.dataset.gifIndex = gifIndex;

            const placeholder = document.createElement('div');
            placeholder.className = 'placeholder-gif';

            const placeholderImage = document.createElement('img');
            placeholderImage.src = REEL_PLACEHOLDER_URL;
            placeholderImage.alt = '';
            placeholderImage.draggable = false;

            placeholder.appendChild(placeholderImage);
            gifItem.appendChild(placeholder);

            return gifItem;
        }

        function setStripOffset(offset) {
            state.currentOffset = offset;
            slotStrip.style.transform = `translateX(${offset}px)`;
        }

        function setItemSpinState(isActive) {
            slotStrip
                .querySelectorAll('.gif-item')
                .forEach((item) => item.classList.toggle('spinning', isActive));
        }

        function getCenteredItemIndex() {
            const centerPosition = -state.currentOffset + SLOT_CENTER;
            return Math.round(centerPosition / ITEM_WIDTH);
        }

        function getAlignedOffset(itemIndex) {
            return HIGHLIGHT_CENTER_OFFSET - (itemIndex * ITEM_WIDTH);
        }

        function getSpinSpeed(elapsedMs, currentSpeed) {
            if (elapsedMs < 1200) {
                return 35;
            }

            if (elapsedMs < 2500) {
                const decayFactor = (elapsedMs - 1200) / 1300;
                return 35 * (1 - decayFactor * 0.8);
            }

            if (elapsedMs < 3800) {
                const decayFactor = (elapsedMs - 2500) / 1300;
                return 7 * (1 - decayFactor * 0.7);
            }

            return Math.max(0.3, currentSpeed * 0.9);
        }

        function startSpin() {
            if (state.isSpinning) {
                return;
            }

            state.isSpinning = true;
            state.spinSpeed = 35;
            state.spinTime = 0;
            spinButton.disabled = true;
            resultContainer.innerHTML = '';

            const randomOffset =
                Math.random() * (START_OFFSET_MAX - START_OFFSET_MIN) + START_OFFSET_MIN;

            setStripOffset(randomOffset);
            setItemSpinState(false);
            setTimeout(() => setItemSpinState(true), 10);

            clearInterval(state.spinInterval);
            state.spinInterval = setInterval(runSpinFrame, TICK_MS);
        }

        function runSpinFrame() {
            state.spinTime += TICK_MS;
            state.spinSpeed = getSpinSpeed(state.spinTime, state.spinSpeed);

            if (state.spinTime >= 3800 && state.spinSpeed < 2) {
                const targetOffset = getAlignedOffset(getCenteredItemIndex());
                const distance = targetOffset - state.currentOffset;

                if (Math.abs(distance) < 2) {
                    finishSpin(targetOffset);
                    return;
                }

                const adjustment = Math.min(1.5, Math.abs(distance) * 0.3);
                setStripOffset(state.currentOffset + (distance < 0 ? -adjustment : adjustment));
                return;
            }

            setStripOffset(state.currentOffset - state.spinSpeed);
        }

        function finishSpin(targetOffset) {
            clearInterval(state.spinInterval);
            state.spinInterval = null;
            setStripOffset(targetOffset);
            setItemSpinState(false);
            state.isSpinning = false;
            spinButton.disabled = false;
            showWinner(getWinnerGif());
        }

        function getWinnerGif() {
            const winnerIndex = ((getCenteredItemIndex() % GIFS.length) + GIFS.length) % GIFS.length;
            return GIFS[winnerIndex];
        }

        function showWinner(winnerGif) {
            resultContainer.innerHTML = `
                <div class="winner-text">Congratulations!</div>
            `;

            setTimeout(() => showWinnerOverlay(winnerGif), OVERLAY_SHOW_DELAY_MS);
        }

        function renderPullHistory() {
            historyList.innerHTML = '';

            GIFS.forEach((gif) => {
                const item = document.createElement('li');
                item.className = 'history-item';

                const name = document.createElement('span');
                name.className = 'history-name';
                name.textContent = formatGifName(gif);

                const count = document.createElement('span');
                count.className = 'history-count';
                count.textContent = `${pullCounts[gif]} pulls`;

                item.appendChild(name);
                item.appendChild(count);
                historyList.appendChild(item);
            });
        }

        function formatGifName(gifPath) {
            return gifPath
                .split('/')
                .pop()
                .replace('.gif', '')
                .replace(/[-_]+/g, ' ');
        }

        function showWinnerOverlay(winnerGif) {
            const overlay = document.createElement('div');
            overlay.className = 'big-winner-overlay';

            const winnerImage = document.createElement('img');
            winnerImage.className = 'big-winner-img';
            winnerImage.src = winnerGif;
            winnerImage.alt = 'Winning GIF';

            overlay.appendChild(winnerImage);
            document.body.appendChild(overlay);

            const removeOverlay = () => {
                overlay.style.animation = 'fadeOutBig 0.5s forwards';

                setTimeout(() => {
                    overlay.remove();
                    document.removeEventListener('mousedown', removeOverlay);
                }, 1000);
            };

            setTimeout(() => {
                document.addEventListener('mousedown', removeOverlay);
            }, OVERLAY_DISMISS_DELAY_MS);

            setTimeout(() => {
                winnerImage.src = REEL_PLACEHOLDER_URL;
                pullCounts[winnerGif] += 1;
                renderPullHistory();
            }, WINNER_GIF_DURATION_MS);
        }

        setupSlots();
    </script>
</body>
</html>
