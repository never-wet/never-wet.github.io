<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shrine Domain Gesture Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="Hand tracking preview">
        <div class="viewport">
          <video id="video" class="input-video" playsinline muted></video>
          <canvas id="effectCanvas" class="effect-canvas"></canvas>
          <canvas id="overlay" class="overlay-canvas"></canvas>
          <div id="emptyState" class="empty-state">
            <p>Shrine Domain Gesture Lab</p>
          </div>
          <div id="statusBadge" class="status-badge">Camera idle</div>
        </div>
      </section>

      <aside class="control-panel" aria-label="Tracking controls">
        <header>
          <p class="eyebrow">MediaPipe Hands</p>
          <h1>Gesture energy lab</h1>
        </header>

        <div class="actions">
          <button id="startButton" class="primary-button" type="button">Start camera</button>
          <button id="stopButton" class="secondary-button" type="button" disabled>Stop</button>
        </div>

        <div class="readout-grid">
          <div>
            <span>Hands</span>
            <strong id="handCount">0</strong>
          </div>
          <div>
            <span>FPS</span>
            <strong id="fpsValue">0</strong>
          </div>
          <div>
            <span>Gesture</span>
            <strong id="gestureValue">Idle</strong>
          </div>
          <div>
            <span>Energy</span>
            <strong id="energyValue">0%</strong>
          </div>
        </div>

        <p id="debugReason" class="debug-reason">No gesture</p>

        <div class="control-group">
          <label for="maxHands">Max hands</label>
          <select id="maxHands">
            <option value="1">1 hand</option>
            <option value="2" selected>2 hands</option>
          </select>
        </div>

        <div class="control-group">
          <label for="confidence">Detection confidence</label>
          <input id="confidence" type="range" min="0.1" max="0.9" step="0.05" value="0.7" />
          <span id="confidenceValue">0.70</span>
        </div>

        <label class="toggle-row">
          <input id="showSkeleton" type="checkbox" checked />
          <span>Skeleton</span>
        </label>

        <label class="toggle-row">
          <input id="showPoints" type="checkbox" checked />
          <span>Keypoints</span>
        </label>

        <label class="toggle-row">
          <input id="showEnergy" type="checkbox" checked />
          <span>Energy effect</span>
        </label>

        <p id="errorText" class="error-text" role="alert"></p>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
  </body>
</html>
