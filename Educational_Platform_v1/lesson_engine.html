<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lesson Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
</head>
<body class="bg-[#0a0a0a] text-white p-20">
    <button onclick="location.href='dashboard.html'" class="mb-10 opacity-50 hover:opacity-100">← Back</button>
    <h1 class="text-5xl font-black mb-10">Schrödinger Equation</h1>
    <div class="bg-white/5 p-10 rounded-xl border-l-4 border-white mb-10">
        dir i\hbar \frac{\partial}{\partial t} \Psi(\mathbf{r},t) = \hat{H} \Psi(\mathbf{r},t) dir
    </div>
    <p class="text-xl opacity-60 max-w-3xl leading-relaxed">This equation describes how the quantum state of a physical system changes with time.</p>
</body>
</html>
