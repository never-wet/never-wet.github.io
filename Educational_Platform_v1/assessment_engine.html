<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white flex items-center justify-center h-screen p-10">
    <div class="max-w-xl w-full border border-white/10 p-10 rounded-lg">
        <h2 class="text-xl mb-6 opacity-50">Specialist Verification</h2>
        <p class="text-2xl mb-10">What is the derivative of position with respect to time?</p>
        <input type="text" id="ans" class="bg-transparent border-b border-white w-full py-4 outline-none text-2xl mb-10" placeholder="Type answer...">
        <button onclick="if(document.getElementById('ans').value.toLowerCase()=='velocity'){alert('VERIFIED');location.href='dashboard.html'}else{alert('ACCESS DENIED')}" class="w-full py-4 border border-white uppercase text-xs">Verify Entry</button>
    </div>
</body>
</html>
