<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
</head>
<body class="bg-black overflow-hidden">
    <button onclick="location.href='dashboard.html'" class="fixed top-10 left-10 z-50 text-white opacity-50">EXIT LAB</button>
    <canvas id="webgl"></canvas>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const sun = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true }));
        scene.add(sun);
        const planet = new THREE.Mesh(new THREE.SphereGeometry(0.5, 24, 24), new THREE.MeshStandardMaterial({ color: 0x4444ff }));
        scene.add(planet);
        const light = new THREE.PointLight(0xffffff, 100); scene.add(light);
        camera.position.z = 20;
        let a = 0;
        function anim() { 
            requestAnimationFrame(anim); a += 0.02;
            planet.position.x = Math.cos(a) * 10; planet.position.z = Math.sin(a) * 10;
            sun.rotation.y += 0.01; renderer.render(scene, camera);
        }
        anim();
    </script>
</body>
</html>
