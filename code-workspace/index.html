<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=./out/" />
    <title>Code Workspace</title>
    <meta
      name="description"
      content="Open the Code Workspace browser-based developer environment."
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #1e1e1e;
        --panel: #252526;
        --line: #3c3c3c;
        --text: #d4d4d4;
        --muted: #9a9a9a;
        --accent: #007acc;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100% - 32px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 28px;
      }

      span {
        color: var(--accent);
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 8px;
        font-size: clamp(1.7rem, 6vw, 3rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      a {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 22px;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        padding: 0 16px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
    <script>
      window.location.replace("./out/");
    </script>
  </head>
  <body>
    <main>
      <span>Code Workspace</span>
      <h1>Opening developer environment</h1>
      <p>If the app does not open automatically, use the launch button.</p>
      <a href="./out/">Launch Code Workspace</a>
    </main>
  </body>
</html>
