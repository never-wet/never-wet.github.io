        font-family: 'Plus Jakarta Sans', sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.14), transparent 28%),
          radial-gradient(circle at 86% 14%, rgba(245, 158, 11, 0.08), transparent 20%),
          linear-gradient(180deg, #0f172a 0%, #101a31 44%, #0f172a 100%);
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot-card {
        width: min(100%, 760px);
        padding: 32px;
        border: 1px solid #334155;
        border-radius: 16px;
        background:
          linear-gradient(180deg, rgba(20, 184, 166, 0.08), transparent 24%),
          rgba(30, 41, 59, 0.88);
        box-shadow: inset 0 1px 0 rgba(248, 250, 252, 0.04);
      }

      .boot-kicker {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        margin: 0 0 12px;
        color: #14b8a6;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .boot-brand-mark {
        width: 1.4rem;
        height: 1.4rem;
        border-radius: 0.75rem;
        box-shadow: 0 10px 24px rgba(10, 8, 12, 0.25);
      }

      .boot-card h1 {
        margin: 0;
        font-family: 'Newsreader', serif;
        font-size: clamp(2.5rem, 6vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      .boot-card p {
        margin: 16px 0 0;
        color: #cbd5e1;
        font-size: 1rem;
        line-height: 1.7;
      }

      .boot-card a,
      .boot-card code {
        color: #f8fafc;
      }

      .boot-card a {
        text-underline-offset: 0.18em;
      }
