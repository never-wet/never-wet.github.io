<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Loreline is a premium worldbuilding and story-development platform for writers, RPG creators, and storytellers building entire fictional universes."
    />
    <meta name="theme-color" content="#0F172A" />
    <meta property="og:title" content="Loreline" />
    <meta
      property="og:description"
      content="An immersive premium platform for worldbuilding, lore management, narrative structure, timelines, character systems, and manuscript writing inside one connected story ecosystem."
    />
    <meta property="og:type" content="website" />
    <title>Loreline | Novel Writing and Worldbuilding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700;6..72,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.14), transparent 28%),
          radial-gradient(circle at 86% 14%, rgba(245, 158, 11, 0.08), transparent 20%),
          linear-gradient(180deg, #0f172a 0%, #101a31 44%, #0f172a 100%);
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot-card {
        width: min(100%, 760px);
        padding: 32px;
        border: 1px solid #334155;
        border-radius: 16px;
        background:
          linear-gradient(180deg, rgba(20, 184, 166, 0.08), transparent 24%),
          rgba(30, 41, 59, 0.88);
        box-shadow: inset 0 1px 0 rgba(248, 250, 252, 0.04);
      }

      .boot-kicker {
        margin: 0 0 12px;
        color: #14b8a6;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .boot-card h1 {
        margin: 0;
        font-family: 'Newsreader', serif;
        font-size: clamp(2.5rem, 6vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      .boot-card p {
        margin: 16px 0 0;
        color: #cbd5e1;
        font-size: 1rem;
        line-height: 1.7;
      }

      .boot-card a,
      .boot-card code {
        color: #f8fafc;
      }

      .boot-card a {
        text-underline-offset: 0.18em;
      }
    </style>
    <script type="module" crossorigin src="./assets/dev--6Z3c13e.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/dev-1UaoijVI.css">
  </head>
  <body>
    <div id="root">
      <main class="boot-shell">
        <section class="boot-card" aria-live="polite">
          <p class="boot-kicker">Loreline</p>
          <h1>Loading the homepage.</h1>
          <p>
            This developer entry boots the React app for Loreline. If you opened this file directly and the page does
            not start, open <a href="./index.html">index.html</a> or run <code>npm run dev</code> from the
            <code>loreline</code> folder.
          </p>
        </section>
      </main>
    </div>
    <script>
      if (window.location.protocol === 'file:') {
        window.location.replace(`./index.html${window.location.search}${window.location.hash}`)
      }
    </script>
  </body>
</html>
