<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Never Wet Chat | Gemini AI Assistant</title>
    <meta
      name="description"
      content="A clean frontend chat interface that sends messages to a secure backend Gemini API route."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f2ed;
        --panel: #ffffff;
        --panel-soft: #f8f7f3;
        --ink: #1f2421;
        --muted: #69716c;
        --line: rgba(31, 36, 33, 0.13);
        --accent: #2563eb;
        --accent-ink: #ffffff;
        --success: #138a63;
        --danger: #b42318;
        --shadow: 0 26px 80px rgba(31, 36, 33, 0.14);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background:
          linear-gradient(90deg, rgba(31, 36, 33, 0.04) 1px, transparent 1px),
          linear-gradient(180deg, rgba(31, 36, 33, 0.04) 1px, transparent 1px),
          radial-gradient(circle at 15% 12%, rgba(37, 99, 235, 0.13), transparent 26rem),
          radial-gradient(circle at 92% 86%, rgba(19, 138, 99, 0.12), transparent 25rem),
          var(--bg);
        background-size: 48px 48px, 48px 48px, auto, auto, auto;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .page-shell {
        width: min(1120px, calc(100% - 28px));
        height: 100dvh;
        min-height: 100dvh;
        max-height: 100dvh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 18px;
        margin: 0 auto;
        padding: 18px 0;
      }

      .site-bar {
        min-height: 52px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 14px 44px rgba(31, 36, 33, 0.08);
        backdrop-filter: blur(18px);
      }

      .site-bar a {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--ink);
        color: var(--bg);
        font-size: 0.78rem;
        font-weight: 900;
      }

      .site-bar span {
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .chat-shell {
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto auto;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .chat-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: clamp(18px, 3vw, 28px);
        border-bottom: 1px solid var(--line);
      }

      .chat-heading p,
      .chat-heading h1 {
        margin: 0;
      }

      .chat-heading p {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .chat-heading h1 {
        margin-top: 5px;
        font-size: clamp(1.7rem, 4vw, 3.4rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .status-dot {
        width: 13px;
        height: 13px;
        flex: 0 0 13px;
        border-radius: 999px;
        background: var(--success);
        box-shadow: 0 0 0 8px rgba(19, 138, 99, 0.12);
      }

      .message-list {
        min-height: 0;
        display: grid;
        align-content: start;
        gap: 12px;
        overflow-y: auto;
        padding: clamp(16px, 3vw, 28px);
        scroll-behavior: smooth;
      }

      .message {
        width: min(78%, 720px);
        display: grid;
        gap: 6px;
      }

      .message span {
        color: var(--muted);
        font-size: 0.74rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .message p {
        margin: 0;
        padding: 13px 15px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
        color: var(--ink);
        line-height: 1.5;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .message--user {
        justify-self: end;
      }

      .message--user span {
        text-align: right;
      }

      .message--user p {
        border-color: rgba(37, 99, 235, 0.35);
        border-top-right-radius: 2px;
        background: var(--accent);
        color: var(--accent-ink);
      }

      .message--assistant p {
        border-top-left-radius: 2px;
      }

      .message--loading p {
        width: fit-content;
        display: flex;
        gap: 5px;
        align-items: center;
      }

      .message--loading i {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--muted);
        animation: pulse 0.9s ease-in-out infinite;
      }

      .message--loading i:nth-child(2) {
        animation-delay: 0.12s;
      }

      .message--loading i:nth-child(3) {
        animation-delay: 0.24s;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.32;
          transform: translateY(0);
        }

        50% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }

      .chat-error {
        display: none;
        margin: 0 clamp(16px, 3vw, 28px) 12px;
        padding: 11px 13px;
        border: 1px solid rgba(180, 35, 24, 0.24);
        border-radius: 8px;
        background: rgba(180, 35, 24, 0.08);
        color: var(--danger);
        font-size: 0.9rem;
        font-weight: 800;
      }

      .chat-error.is-visible {
        display: block;
      }

      .chat-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        padding: clamp(14px, 2.4vw, 20px);
        border-top: 1px solid var(--line);
        background: rgba(248, 247, 243, 0.76);
      }

      .chat-form label {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      .chat-form input,
      .chat-form textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        padding: 13px 14px;
        outline: none;
      }

      .chat-form textarea {
        min-height: 58px;
        max-height: 170px;
        resize: vertical;
      }

      .chat-form input {
        min-height: 58px;
      }

      .chat-form input:focus,
      .chat-form textarea:focus {
        border-color: rgba(37, 99, 235, 0.5);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.11);
      }

      .chat-form input:disabled,
      .chat-form textarea:disabled {
        color: var(--muted);
      }

      .chat-form button {
        min-width: 106px;
        min-height: 58px;
        border: 1px solid var(--ink);
        border-radius: 8px;
        background: var(--ink);
        color: var(--bg);
        font-weight: 900;
      }

      .chat-form button:hover:not(:disabled),
      .chat-form button:focus-visible:not(:disabled) {
        border-color: var(--accent);
        background: var(--accent);
      }

      .chat-form button:disabled {
        cursor: not-allowed;
        opacity: 0.44;
      }

      @media (max-width: 720px) {
        .page-shell {
          width: min(100% - 20px, 680px);
          padding: 10px 0;
        }

        .chat-shell {
          height: calc(100dvh - 82px);
          min-height: calc(100dvh - 82px);
        }

        .message {
          width: min(92%, 720px);
        }

        .chat-form {
          grid-template-columns: 1fr;
        }

        .chat-form button {
          width: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <div class="site-bar">
        <a href="../">NW</a>
        <span>Secure Gemini Chat</span>
      </div>

      <section class="chat-shell" aria-label="AI chat">
        <div class="chat-heading">
          <div>
            <p>AI Assistant</p>
            <h1>Never Wet Chat</h1>
          </div>
          <span class="status-dot" aria-hidden="true"></span>
        </div>

        <div class="message-list" id="messageList" aria-live="polite">
          <article class="message message--assistant">
            <span>AI</span>
            <p>Hi, I am the Never Wet assistant. What can I help with?</p>
          </article>
        </div>

        <p class="chat-error" id="chatError" role="alert">
          Sorry, I could not get a response. Please try again.
        </p>

        <form class="chat-form" id="chatForm">
          <label for="chatMessage">Message</label>
          <textarea id="chatMessage" placeholder="Ask something..." rows="3"></textarea>
          <button id="sendButton" type="submit" disabled>Send</button>
        </form>
      </section>
    </main>

    <script>
      const API_URL = "/api/chat";
      const FRIENDLY_ERROR = "Sorry, I could not get a response. Please try again.";
      const NETWORK_ERROR =
        "The chat backend is not reachable. Run the Next.js server or deploy this to a host that supports /api/chat.";

      const form = document.getElementById("chatForm");
      const input = document.getElementById("chatMessage");
      const sendButton = document.getElementById("sendButton");
      const messageList = document.getElementById("messageList");
      const errorBox = document.getElementById("chatError");

      let isLoading = false;
      let loadingMessage = null;

      function setLoading(nextValue) {
        isLoading = nextValue;
        input.disabled = nextValue;
        sendButton.disabled = nextValue || !input.value.trim();
        sendButton.textContent = nextValue ? "Sending" : "Send";
      }

      function setError(message) {
        errorBox.textContent = message || FRIENDLY_ERROR;
        errorBox.classList.add("is-visible");
      }

      function clearError() {
        errorBox.classList.remove("is-visible");
      }

      function scrollMessages() {
        window.requestAnimationFrame(() => {
          messageList.scrollTo({
            top: messageList.scrollHeight,
            behavior: "smooth"
          });

          window.scrollTo({
            top: document.documentElement.scrollHeight,
            behavior: "smooth"
          });
        });
      }

      function appendMessage(role, content) {
        const article = document.createElement("article");
        article.className = `message message--${role}`;

        const label = document.createElement("span");
        label.textContent = role === "user" ? "You" : "AI";

        const body = document.createElement("p");
        body.textContent = content;

        article.append(label, body);
        messageList.append(article);
        scrollMessages();
      }

      function showLoadingMessage() {
        loadingMessage = document.createElement("article");
        loadingMessage.className = "message message--assistant message--loading";
        loadingMessage.innerHTML = "<span>AI</span><p><i></i><i></i><i></i></p>";
        messageList.append(loadingMessage);
        scrollMessages();
      }

      function hideLoadingMessage() {
        loadingMessage?.remove();
        loadingMessage = null;
      }

      async function sendMessage() {
        const message = input.value.trim();

        if (!message || isLoading) return;

        appendMessage("user", message);
        input.value = "";
        clearError();
        setLoading(true);
        showLoadingMessage();

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              message
            })
          });

          const data = await response.json().catch(() => null);

          if (!response.ok || !data?.reply) {
            throw new Error(data?.error || FRIENDLY_ERROR);
          }

          appendMessage("assistant", data.reply);
        } catch (sendError) {
          setError(sendError instanceof Error ? sendError.message : NETWORK_ERROR);
        } finally {
          hideLoadingMessage();
          setLoading(false);
          window.requestAnimationFrame(() => {
            input.focus();
          });
        }
      }

      input.addEventListener("input", () => {
        sendButton.disabled = isLoading || !input.value.trim();
      });

      input.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" || event.shiftKey) return;
        event.preventDefault();
        sendMessage();
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        sendMessage();
      });
    </script>
  </body>
</html>
