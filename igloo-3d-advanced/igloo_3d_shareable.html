
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igloo 3D Advanced | Digital Brutalism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fff;
            margin: 0;
            overflow-x: hidden;
        }
        canvas#three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .bento-card {
            background: rgba(245, 245, 247, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 2.5rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bento-card:hover {
            transform: scale(1.02);
            background: rgba(245, 245, 247, 0.9);
        }
    </style>
</head>
<body>

    <canvas id="three-canvas"></canvas>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 px-10 py-8 flex justify-between items-center mix-blend-difference text-white">
        <div class="font-black text-2xl tracking-tighter">IGLOO.</div>
        <div class="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest">
            <a href="#">Work</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="h-screen flex items-center px-10 md:px-20">
        <div id="hero-content">
            <h1 class="text-[14vw] font-black leading-[0.8] tracking-tighter uppercase opacity-0 translate-y-20">
                GLSL <br> 
                <span class="text-gray-200">Motion</span>
            </h1>
            <p class="mt-10 max-w-md text-gray-500 font-medium opacity-0">
                A standalone 3D experience featuring interactive WebGL geometry and inertia-based scrolling.
            </p>
        </div>
    </section>

    <!-- Bento Grid -->
    <section class="p-10 md:p-20 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bento-card h-96 p-10 flex flex-col justify-end">
            <h3 class="text-3xl font-black uppercase italic">WebGL Core</h3>
        </div>
        <div class="h-96 p-10 flex flex-col justify-end bg-black text-white rounded-[2.5rem]">
            <h3 class="text-3xl font-black uppercase italic">Brutalism</h3>
        </div>
        <div class="bento-card h-96 p-10 flex flex-col justify-end">
            <h3 class="text-3xl font-black uppercase italic">Interactivity</h3>
        </div>
    </section>

    <div class="h-[50vh]"></div>

    <script>
        // --- 1. SMOOTH SCROLL (LENIS) ---
        const lenis = new Lenis();
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // --- 2. 3D SCENE (THREE.JS) ---
        const canvas = document.querySelector('#three-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Create Geometry (Like the Igloo blocks)
        const geometry = new THREE.IcosahedronGeometry(2, 0);
        const material = new THREE.MeshNormalMaterial({ wireframe: true });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        camera.position.z = 5;

        // Mouse Interaction Logic
        let mouseX = 0;
        let mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) - 0.5;
            mouseY = (e.clientY / window.innerHeight) - 0.5;
        });

        function animate3D() {
            // Smoothly lerp the rotation to follow mouse
            mesh.rotation.y += (mouseX * 0.5 - mesh.rotation.y) * 0.05;
            mesh.rotation.x += (mouseY * 0.5 - mesh.rotation.x) * 0.05;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate3D);
        }
        animate3D();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 3. ENTRANCE ANIMATIONS (GSAP) ---
        gsap.to("h1", { opacity: 1, y: 0, duration: 1.5, ease: "expo.out", delay: 0.5 });
        gsap.to("p", { opacity: 1, duration: 1, delay: 1 });
    </script>
</body>
</html>
