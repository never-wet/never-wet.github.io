<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGLOO | Seamless Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        
        /* HIDE SCROLLBARS BUT KEEP SCROLLING */
        html, body {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
            background: #000;
            color: #fff;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        
        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        canvas#webgl { position: fixed; top: 0; left: 0; z-index: -1; }
        .section { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        .bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; width: 80%; max-width: 1200px; }
        .card { height: 400px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; backdrop-filter: blur(20px); transition: all 0.5s ease; overflow: hidden; }
        h1 { font-size: 15vw; line-height: 0.8; letter-spacing: -0.05em; text-transform: uppercase; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="webgl"></canvas>
    
    <div id="scroll-wrapper">
        <div id="content">
            <section class="section"><h1>Igloo</h1></section>
            <section class="section">
                <div class="bento-grid">
                    <div class="card p-10 flex flex-col justify-end"><h3>Immersive</h3></div>
                    <div class="card p-10 flex flex-col justify-end bg-white text-black"><h3>Fluid</h3></div>
                    <div class="card p-10 flex flex-col justify-end"><h3>Infinite</h3></div>
                </div>
            </section>
            <section class="section"><h1>Motion</h1></section>
        </div>
    </div>

    <script>
        // 1. CLONE CONTENT FOR SEAMLESS LOOP
        const content = document.querySelector('#content');
        const wrapper = document.querySelector('#scroll-wrapper');
        const clone = content.cloneNode(true);
        wrapper.appendChild(clone);

        // 2. SMOOTH SCROLL (LENIS)
        const lenis = new Lenis({ 
            infinite: true, 
            lerp: 0.04, 
            wheelMultiplier: 1.1,
            touchMultiplier: 2
        });
        
        function raf(time) { 
            lenis.raf(time); 
            requestAnimationFrame(raf); 
        }
        requestAnimationFrame(raf);

        // 3. WEBGL SCENE
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#webgl'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // 3D Dome
        const geometry = new THREE.IcosahedronGeometry(5, 10);
        const material = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.1 });
        const dome = new THREE.Mesh(geometry, material);
        scene.add(dome);
        camera.position.z = 12;

        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) - 0.5;
            mouseY = (e.clientY / window.innerHeight) - 0.5;
        });

        function animate() {
            dome.rotation.y += 0.001;
            dome.rotation.x += 0.0005;
            
            // Camera follow mouse with "Inertia"
            camera.position.x += (mouseX * 4 - camera.position.x) * 0.03;
            camera.position.y += (-mouseY * 4 - camera.position.y) * 0.03;
            camera.lookAt(0,0,0);

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
