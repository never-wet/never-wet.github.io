      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    input[type=&quot;range&quot;].s-range::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    input[type=&quot;range&quot;].s-range::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
    }

    /* Toggle switch */
    .s-toggle {
      position: relative;
      width: 36px;
      height: 20px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }
    .s-toggle.on {
      background: rgba(255,255,255,0.25);
    }
    .s-toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .s-toggle.on::after {
      transform: translateX(16px);
      background: #fff;
    }

    .settings-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 16px 0;

    .settings-tier {

      font-weight: 400;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
      text-align: center;
      margin-top: 14px;

      .settings-panel {
        width: 100%;

    /* ===== SECTIONS ===== */
    .section {
      position: relative;
      z-index: 10;
      background: rgb(2,2,3);
    }

    .section-inner {
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
    }

    .section-whatwedo {
      padding: 160px 48px 120px;
    }
    .section-label {

      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .section-heading {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(36px, 5.5vw, 72px);

      color: #fff;
      line-height: 1.05;
      letter-spacing: -1.5px;
      max-width: 700px;
      margin-bottom: 80px;
    }
    .section-heading .thin { color: rgba(255,255,255,0.3); }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .feature-card {
      background: rgb(2,2,3);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: background 0.3s ease;
    }
    .feature-card:hover { background: rgba(255,255,255,0.02); }
    .feature-icon {
      width: 40px; height: 40px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .feature-icon svg {
      width: 18px; height: 18px;
      stroke: rgba(255,255,255,0.5);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .feature-title {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      letter-spacing: -0.3px;
    }
    .feature-desc {
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      line-height: 1.7;
    }

    /* Research section */
    .section-research {
      padding: 120px 48px 0;
    }
    .section-research .section-inner {
      display: flex;
      flex-direction: column;
    }
    .research-content {
      padding: 0 0 40px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .research-list {
      display: flex;
      gap: 48px;
    }
    .research-item {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex: 1;
      cursor: default;
      padding: 20px;
      border-radius: 12px;
      transition: background 0.3s ease;
    }
    .research-item:hover {
      background: rgba(255,255,255,0.03);
    }
    .research-item.active .research-num {
      color: rgba(255,255,255,0.5);
    }
    .research-item.active .research-item-title {
      color: rgba(255,255,255,1);
    }
    .research-num {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 32px;
      color: rgba(255,255,255,0.12);
      line-height: 1;
      flex-shrink: 0;
      width: 40px;
    }
    .research-item-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .research-item-title {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
    }
    .research-item-desc {
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      line-height: 1.7;
    }
    .research-canvas-wrap {
      position: relative;
      overflow: hidden;
      width: 100%;

    .research-canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      pointer-events: none;
      touch-action: auto;
      opacity: 0.35;
    }

    /* Numbers section */
    .section-numbers {
      padding: 160px 48px;
      position: relative;
      overflow: hidden;
    }
    .section-numbers .section-inner {
      position: relative;
      z-index: 2;
    }
    .numbers-canvas-wrap {
      display: none;
    }
    .numbers-content {
      position: relative;
    }
    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 48px;
      margin-top: 80px;
    }
    .number-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .number-val {

      color: #fff;

    .number-label {

      font-weight: 300;
      color: rgba(255,255,255,0.35);
      line-height: 1.5;
    }
    .number-divider {
      width: 32px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 8px 0;
    }

    /* CTA section */
    .section-cta {
      padding: 160px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;

      margin-bottom: 48px;
    }
    .cta-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* Footer */
    .footer {
      position: relative;
      z-index: 10;
      background: rgb(2,2,3);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    }

    .footer-right {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.3px;
    }

    /* Scroll reveal */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.35s; }
    .reveal-delay-5 { transition-delay: 0.4s; }
    .reveal-delay-6 { transition-delay: 0.5s; }

    .hero-scroll .status-dot {
      width: 6px;
      height: 6px;
      background: rgba(100, 255, 160, 0.8);
      border-radius: 50%;

    @keyframes statusPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px rgba(100, 255, 160, 0.4); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {

      .hero-content { padding: 0 24px 32px; }
      .hero-h1 { font-size: clamp(44px, 13vw, 72px); letter-spacing: -1px; margin-bottom: 24px; }
      .hero-row { flex-direction: column; align-items: flex-start; gap: 20px; }
      .hero-sub { font-size: 12px; max-width: 100%; }
      .hero-bottom { padding: 16px 24px; }
      .hero-stats { gap: 24px; }
      .hero-stat-val { font-size: 14px; }
      .hero-stat-label { font-size: 9px; }
      .hero-scroll { display: none; }

      .section-whatwedo { padding: 100px 24px 80px; }
      .section-heading { margin-bottom: 48px; }
      .features-grid { grid-template-columns: 1fr; }
      .feature-card { padding: 32px 24px; }
      .section-research { padding: 100px 24px 0; }
      .research-list { flex-direction: column; gap: 32px; }
      .research-canvas-wrap { height: 280px; }
      .section-numbers { padding: 100px 24px; }
      .numbers-grid { grid-template-columns: repeat(2, 1fr); gap: 32px; }
      .section-cta { padding: 100px 24px; }
      .cta-actions { flex-direction: column; }
      .footer { padding: 32px 24px; flex-direction: column; gap: 16px; align-items: flex-start; }
    }

    /* ===== ENTRANCE ANIMATIONS ===== */
    #crt-frame {
      opacity: 0;
      transition: opacity 2.5s cubic-bezier(0.25, 0.1, 0.25, 1);
      transition-delay: 0.8s;
    }
    #crt-frame.visible {
      opacity: 1;
    }

    .nav-brand, .nav-links a, .nav-links .nav-cta, .nav-hamburger {
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 0.6s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .nav-brand.anim-in, .nav-links a.anim-in, .nav-links .nav-cta.anim-in, .nav-hamburger.anim-in {
      opacity: 1;
      transform: translateY(0);
    }
    /* Nav link delays */
    .nav-brand { transition-delay: 0.3s; }
    .nav-links a:nth-child(1) { transition-delay: 0.4s; }
    .nav-links a:nth-child(2) { transition-delay: 0.48s; }
    .nav-links a:nth-child(3) { transition-delay: 0.56s; }
    .nav-links a:nth-child(4) { transition-delay: 0.64s; }
    .nav-links .nav-cta { transition-delay: 0.72s; }
    .nav-hamburger { transition-delay: 0.4s; }

    .hero-h1 {
      opacity: 0;
      transition: opacity 0.9s cubic-bezier(0.25, 0.1, 0.25, 1);
      transition-delay: 0.6s;
      will-change: transform, opacity;
    }
    .hero-h1.anim-in {
      opacity: 1;
    }

    .hero-sub {
      opacity: 0;
      transition: opacity 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
      transition-delay: 0.9s;
      will-change: transform, opacity;
    }
    .hero-sub.anim-in {
      opacity: 1;
    }

    .hero-actions {
      opacity: 0;
      transition: opacity 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
      transition-delay: 1.05s;
      will-change: transform, opacity;
    }
    .hero-actions.anim-in {
      opacity: 1;
    }

    .hero-stat {
      opacity: 0;
      transition: opacity 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .hero-stat:nth-child(1) { transition-delay: 1.2s; }
    .hero-stat:nth-child(2) { transition-delay: 1.32s; }
    .hero-stat:nth-child(3) { transition-delay: 1.44s; }
    .hero-stat.anim-in {
      opacity: 1;
    }

    .hero-scroll {
      opacity: 0;
      transition: opacity 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
      transition-delay: 1.5s;
      gap: 10px;
    }
    .hero-scroll.anim-in {
      opacity: 1;
    }

    .hero-bottom {
      will-change: transform;
    }

    .hero-fade, .hero-fade-top {
      opacity: 0;
      transition: opacity 2s cubic-bezier(0.25, 0.1, 0.25, 1);
      transition-delay: 1.0s;
    }
    .hero-fade.anim-in, .hero-fade-top.anim-in {
      opacity: 1;
    }

    /* GPU layer promotion for overlay — prevents canvas repaints */
    #hero-overlay, .hero-fade, .hero-fade-top {
      will-change: auto;
      transform: translateZ(0);
    }

    /* Prevent text selection from triggering overlay repaints during interaction */
    #hero-overlay, #hero-overlay * {
      -webkit-user-select: none;
      user-select: none;
    }
    /* Allow selection only on actual text content when deliberately clicked */
    .hero-h1, .hero-sub, .hero-stat-val, .hero-stat-label {
      -webkit-user-select: text;
      user-select: text;
    }

&lt;script&gt;
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  hamburger.addEventListener('click', () =&gt; {
    hamburger.classList.toggle('open');
    mobileMenu.classList.toggle('open');
  });
  mobileMenu.querySelectorAll('a').forEach(link =&gt; {
    link.addEventListener('click', () =&gt; {
      hamburger.classList.remove('open');
      mobileMenu.classList.remove('open');
    });
  });

  // ===== SETTINGS PANEL =====
  const settingsToggle = document.getElementById('settings-toggle');
  const settingsPanel = document.getElementById('settings-panel');
  const settingsBackdrop = document.getElementById('settings-backdrop');
  const settingsClose = document.getElementById('settings-close');

  function openSettings() {
    settingsToggle.classList.add('open');
    settingsPanel.classList.add('open');
    settingsBackdrop.classList.add('open');
  }
  function closeSettings() {
    settingsToggle.classList.remove('open');
    settingsPanel.classList.remove('open');
    settingsBackdrop.classList.remove('open');
  }
  settingsToggle.addEventListener('click', () =&gt; {
    if (settingsPanel.classList.contains('open')) closeSettings();
    else openSettings();
  });
  settingsBackdrop.addEventListener('click', closeSettings);
  settingsClose.addEventListener('click', closeSettings);

  // ===== NAV SCROLL EFFECT =====
  const mainNav = document.querySelector('.nav');
  window.addEventListener('scroll', () =&gt; {
    if (window.scrollY &gt; 80) mainNav.classList.add('scrolled');
    else mainNav.classList.remove('scrolled');
  }, { passive: true });

  // ===== SCROLL REVEAL =====
  const revealObs = new IntersectionObserver((entries) =&gt; {
    entries.forEach(e =&gt; { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el =&gt; revealObs.observe(el));

  // ===== NUMBER COUNTER =====
  const numObs = new IntersectionObserver((entries) =&gt; {
