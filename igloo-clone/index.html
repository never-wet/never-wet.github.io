<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igloo Clone | Digital Brutalism</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP for Smooth Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Lenis for Smooth Scrolling -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        /* Hide scrollbar but keep functionality */
        html.lenis {
            height: auto;
        }
        .lenis.lenis-smooth {
            scroll-behavior: auto !important;
        }
        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 mix-blend-difference px-6 py-8 md:px-12 flex justify-between items-center text-white">
        <div class="font-black text-2xl tracking-tighter">IGLOO.</div>
        <div class="space-x-8 text-xs font-bold uppercase tracking-widest hidden md:block">
            <a href="#" class="hover:opacity-50 transition">Work</a>
            <a href="#" class="hover:opacity-50 transition">About</a>
            <a href="#" class="hover:opacity-50 transition">Studio</a>
        </div>
        <button class="bg-white text-black px-6 py-2 rounded-full text-xs font-bold uppercase">Contact</button>
    </nav>

    <!-- Hero Section -->
    <section class="h-screen flex flex-col justify-center px-6 md:px-20 relative bg-white">
        <h1 id="hero-text" class="text-[14vw] font-black leading-[0.8] tracking-tighter uppercase opacity-0 translate-y-20">
            Digital <br> 
            <span class="text-gray-200">Brutalism</span>
        </h1>
        <div class="mt-12 max-w-lg">
            <p id="hero-sub" class="text-lg md:text-xl text-gray-500 leading-tight opacity-0">
                A minimalist web framework built for extreme visual impact and performance.
            </p>
        </div>
    </section>

    <!-- Bento Grid Content -->
    <section class="p-6 md:p-20 grid grid-cols-1 md:grid-cols-12 gap-4">
        <div class="md:col-span-8 h-[60vh] bg-gray-100 rounded-[2rem] p-12 flex flex-col justify-end">
            <h3 class="text-5xl font-bold italic tracking-tighter">Engineered for Motion</h3>
        </div>
        <div class="md:col-span-4 h-[60vh] bg-black text-white rounded-[2rem] p-12 flex flex-col justify-end">
            <h3 class="text-5xl font-bold italic tracking-tighter">2026 Core</h3>
        </div>
    </section>

    <!-- Spacer for Scroll demonstration -->
    <section class="h-screen flex items-center justify-center">
        <h2 class="text-gray-100 text-[10vw] font-black uppercase pointer-events-none">Minimalism</h2>
    </section>

    <script>
        // 1. Initialize Smooth Scroll (Lenis)
        const lenis = new Lenis();
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // 2. Entrance Animations (GSAP)
        window.onload = () => {
            gsap.to("#hero-text", {
                opacity: 1,
                y: 0,
                duration: 1.5,
                ease: "expo.out",
                delay: 0.2
            });

            gsap.to("#hero-sub", {
                opacity: 1,
                duration: 1,
                delay: 0.8
            });
        };

        // 3. Scroll-triggered Reveal
        gsap.registerPlugin(ScrollTrigger);
        gsap.from(".md\\:col-span-8", {
            scrollTrigger: {
                trigger: ".md\\:col-span-8",
                start: "top 80%",
            },
            scale: 0.9,
            opacity: 0,
            duration: 1.2,
            ease: "power4.out"
        });
    </script>
</body>
</html>
